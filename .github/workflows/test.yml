name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { name: shared,    cwd: packages/shared,  has_tests: true }
          - { name: worker,    cwd: apps/worker,      has_tests: true }
          - { name: extension, cwd: apps/extension,   has_tests: true }
          - { name: web,       cwd: apps/web,         has_tests: true }
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm --filter @mailfalcon/${{ matrix.package.name }} typecheck

      - name: test
        run: pnpm --filter @mailfalcon/${{ matrix.package.name }} test
        if: matrix.package.has_tests
