<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>MailFalcon</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>MailFalcon</h1>
    </header>

    <main id="root">
      <div id="loading">Loading…</div>
    </main>

    <template id="tpl-signed-in">
      <div class="card">
        <p class="muted">Signed in as</p>
        <p class="email" data-bind="email"></p>
        <a id="dashboard-link" href="https://app.mailfalcon.app/dashboard/" target="_blank" rel="noopener">Open dashboard ↗</a>
        <div id="scheduled-queue"></div>

        <div id="spoof-section" style="margin-top:14px;padding-top:10px;border-top:1px solid #e3e9f2;">
          <p class="muted" style="margin:0 0 6px 0;font-weight:600;">Sender authentication</p>
          <p id="spoof-status" class="muted" style="margin:0 0 6px 0;font-size:11px;">Checking…</p>
          <div id="spoof-controls" class="row" style="gap:6px;flex-wrap:wrap;"></div>
          <p id="spoof-msg" class="msg" style="margin-top:6px;"></p>
        </div>

        <div class="row" style="margin-top:12px;">
          <button id="replay-onboarding" type="button" class="link">Replay intro</button>
          <button id="logout-btn" type="button" class="link">Sign out</button>
        </div>
      </div>
    </template>

    <template id="tpl-onboarding">
      <div class="card">
        <p class="muted">You're in. Three steps to your first tracked email:</p>
        <ol class="steps">
          <li>
            <strong>Compose a message</strong> in Gmail (or reply to one)
          </li>
          <li>
            Leave the <strong>"Privacy mode"</strong> checkbox above the body <em>unchecked</em> &mdash; that's the kill switch if you ever want to send untracked
          </li>
          <li>
            Hit Send. Watch <a href="https://app.mailfalcon.app/dashboard/" target="_blank" rel="noopener">app.mailfalcon.app/dashboard</a> &mdash; opens and clicks land within ~5 seconds
          </li>
        </ol>
        <button id="onboarding-done" type="button">Got it</button>
      </div>
    </template>

    <template id="tpl-request">
      <form id="request-form" class="card">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required placeholder="you@example.com" autocomplete="email" />
        <button type="submit">Send code</button>
        <p id="request-msg" class="msg"></p>
      </form>
    </template>

    <template id="tpl-verify">
      <form id="verify-form" class="card">
        <p class="muted">We sent a 6-digit code to <strong data-bind="email"></strong></p>
        <label for="code">Code</label>
        <input id="code" name="code" type="text" inputmode="numeric" pattern="\d{6}" maxlength="6" required placeholder="123456" autocomplete="one-time-code" />
        <div class="row">
          <button type="button" id="verify-back" class="link">Back</button>
          <button type="submit">Verify</button>
        </div>
        <p id="verify-msg" class="msg"></p>
      </form>
    </template>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
