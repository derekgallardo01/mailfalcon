name = "mailfalcon-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Custom Domains auto-provision the DNS A records + edge TLS certs.
# api. handles /v1/*, /auth/*, /stream, /stripe/webhook.
# t.   handles /p (pixel) and /c (click redirect).
routes = [
  { pattern = "api.mailfalcon.app", custom_domain = true },
  { pattern = "t.mailfalcon.app", custom_domain = true },
]

[vars]
ENVIRONMENT = "production"
PUBLIC_WEB_URL = "https://app.mailfalcon.app"

[[d1_databases]]
binding = "DB"
database_name = "mailfalcon"
database_id = "3382c6a7-6b3c-4c61-a752-697f26f85b0e"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "183f2dd83ebb4e7794865c6b513b055c"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "mailfalcon-assets"

# Local-dev overrides: --local mode reads .dev.vars + a file-backed
# SQLite/KV/R2 inside .wrangler/. The IDs above are ignored locally.
[env.dev]
vars = { ENVIRONMENT = "development", PUBLIC_WEB_URL = "http://localhost:3000" }

# Secrets — set with `wrangler secret put <NAME>`:
#   HMAC_SECRET
#   JWT_SECRET
#   RESEND_API_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_PRICE_ID_PRO (or set as plain var once price is created)

[triggers]
# 22:00 UTC daily = 6pm Eastern. Runs sendDailyDigests() once a day per
# user with digestEnabled=1. Idempotent via users.digest_last_sent_day.
crons = ["0 22 * * *"]
