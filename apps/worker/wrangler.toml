name = "mailfalcon-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Routes wired in CF dashboard after DNS is provisioned:
#   t.mailfalcon.app/*   -> /p, /c
#   api.mailfalcon.app/* -> /v1/*, /auth/*, /stream, /push/*, /stripe/webhook

[vars]
ENVIRONMENT = "development"

# Provisioned later via `wrangler d1 create mailfalcon` etc.
# [[d1_databases]]
# binding = "DB"
# database_name = "mailfalcon"
# database_id = "TBD"
# migrations_dir = "../../packages/db/migrations"

# [[kv_namespaces]]
# binding = "KV"
# id = "TBD"

# [[r2_buckets]]
# binding = "ASSETS"
# bucket_name = "mailfalcon-assets"

# [triggers]
# crons = ["*/5 * * * *"]  # follow-up scanner

# Secrets (set via `wrangler secret put`):
#   HMAC_SECRET
#   JWT_SECRET
#   VAPID_PUBLIC_KEY
#   VAPID_PRIVATE_KEY
#   RESEND_API_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
