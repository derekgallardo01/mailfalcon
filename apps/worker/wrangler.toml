name = "mailfalcon-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Routes wired in CF dashboard after DNS is provisioned:
#   t.mailfalcon.app/*   -> /p, /c
#   api.mailfalcon.app/* -> /v1/*, /auth/*, /stream, /push/*, /stripe/webhook

[vars]
ENVIRONMENT = "development"

# database_id is a placeholder; --local mode ignores it and uses a local SQLite.
# Run `wrangler d1 create mailfalcon` later and replace with the real id.
[[d1_databases]]
binding = "DB"
database_name = "mailfalcon"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "../../packages/db/migrations"

# id placeholder; --local uses a file-backed mock.
[[kv_namespaces]]
binding = "KV"
id = "0000000000000000000000000000000000000000"

# Bucket auto-created in --local mode under .wrangler/.
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "mailfalcon-assets"

# [triggers]
# crons = ["*/5 * * * *"]  # follow-up scanner — enable once endpoints exist

# Secrets (set via `wrangler secret put` for remote, or .dev.vars for local):
#   HMAC_SECRET
#   JWT_SECRET
#   VAPID_PUBLIC_KEY
#   VAPID_PRIVATE_KEY
#   RESEND_API_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
